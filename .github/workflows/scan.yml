name: Stock Alert Scan

on:
  schedule:
    - cron: '0 12 * * 1-6'   # 5:30 PM IST = 12:00 UTC Mon-Sat
  workflow_dispatch:           # allow manual trigger

jobs:
  scan:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run alert scan
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID:   ${{ secrets.CHAT_ID }}
        run: python run.py --mode scan

      - name: Commit updated files
        run: |
          git config user.name  "alert-bot"
          git config user.email "alert-bot@github.com"
          git add config/alerts.json data/alert_history.parquet
          git diff --staged --quiet || (
            git commit --amend --no-edit &&
            git push --force
          )